<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pulse - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-2">Project Pulse</h2> <p 
                    class="text-center text-muted small mb-4">"Specifically Made to be A Companion"</p> 
                    <form id="loginForm">
                  
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="1234" required>
                        </div>
                        <div id="error" class="alert alert-danger d-none py-2 text-center small">Wrong credentials!</div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">LOGIN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
